{% extends 'gestion/base.html' %}

{% block content %}
<style>
    .auth-shell {
        min-height: 72vh;
        display: grid;
        place-items: center;
    }

    .auth-card {
        width: min(460px, 100%);
        border-radius: 24px;
        overflow: hidden;
        border: 1px solid #e8dfd2;
        box-shadow: 0 20px 45px rgba(18, 23, 35, 0.12);
    }

    .auth-header {
        background: linear-gradient(130deg, #d87329 0%, #b65a23 100%);
        color: #fff;
        text-align: center;
        padding: 1.5rem 1rem;
    }

    .auth-header h2 {
        margin-bottom: 0.2rem;
    }

    .auth-input {
        border-radius: 12px;
        border: 1px solid #d8cfbf;
        padding: 0.7rem 0.85rem;
    }

    .auth-input:focus {
        border-color: #d87329;
        box-shadow: 0 0 0 0.2rem rgba(216, 115, 41, 0.15);
    }

    .btn-auth {
        border: none;
        border-radius: 12px;
        background: linear-gradient(130deg, #dc7d33 0%, #be5c23 100%);
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.4px;
        padding: 0.7rem 1rem;
    }

    .btn-auth:hover {
        color: #fff;
        background: linear-gradient(130deg, #ce6f26 0%, #a24f1f 100%);
    }
</style>

<div class="auth-shell">
    <div class="auth-card surface">
        <div class="auth-header">
            <i class="bi bi-door-open fs-2"></i>
            <h2 class="fw-bold mt-1">Iniciar sesion</h2>
            <p class="mb-0 opacity-75 small">Accede para seguir acumulando puntos</p>
        </div>

        <div class="card-body p-4 p-md-5">
            <form method="post">
                {% csrf_token %}

                {% if form.errors or form_errors %}
                    <div class="alert alert-danger py-2 mb-3">
                        Usuario o contrasena incorrectos.
                    </div>
                {% endif %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario o correo</label>
                    <input type="text" name="username" class="form-control auth-input" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Contrasena</label>
                    <input type="password" name="password" class="form-control auth-input" required>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-auth text-uppercase">Entrar</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">No tienes cuenta? <a href="{% url 'registro' %}" class="fw-bold text-decoration-none" style="color: #be5c23;">Registrate aqui</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
